spring:
  application:
    name: tichu-sim
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,email,profile
            redirect-uri: ${WEB_ORIGIN}/auth/callback/google
            authorization-grant-type: authorization_code
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            scope: openid,account_email,profile_nickname
            redirect-uri: ${WEB_ORIGIN}/auth/callback/kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: ${WEB_ORIGIN}/auth/callback/naver
            authorization-grant-type: authorization_code
        provider:
          kakao:
            issuer-uri: https://kauth.kakao.com
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
  jpa:
    show-sql: true
  jwt:
    secret: ${JWT_SECRET}
    accessTokenExpiration: 600      # 10 mins
    refreshTokenExpiration: 604800  # 7 days
    webSocketTokenExpiration: 5     # 5 secs
    botAccessTokenExpiration: 7200  # 2 hrs
  cors:
    allowed-origin: ${WEB_ORIGIN}
  rooms:
    idLength: 5
    outGameExpiration: 3600  # 1 hour
    inGameExpiration: 21600  # 6 hours

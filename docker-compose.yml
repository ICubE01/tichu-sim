services:
  # 1. Database (MySQL 8)
  db:
    image: mysql:8
    container_name: tichu-sim-db
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DATASOURCE_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  # 2. Backend (Spring Boot)
  backend:
    image: ghcr.io/icube-/tichu-sim-backend:latest
    build: .
    container_name: tichu-sim-backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env

  # 3. Frontend (React + Nginx)
  frontend:
    image: ghcr.io/icube-/tichu-sim-frontend:latest
    build: ./frontend
    container_name: tichu-sim-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
